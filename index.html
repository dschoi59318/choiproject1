<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <h1>Lotto Number Generator</h1>
        <button id="generate">Generate Numbers</button>
        <div id="numbers" class="numbers-container"></div>
    </div>

    <div class="container form-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xpqkzgyb" method="POST">
            <div class="form-group">
                <label for="name">성함 / 업체명</label>
                <input type="text" id="name" name="name" required placeholder="홍길동 / (주)컴퍼니">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" required placeholder="문의하실 내용을 입력해주세요."></textarea>
            </div>
            <button type="submit" id="submit-btn">문의하기</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
